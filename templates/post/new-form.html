<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새 글 작성</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .container { max-width: 700px; margin-top: 50px; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>
    <div class="container">
        <h3 class="fw-bold text-primary mb-4">새 글 작성</h3>
        
        <form action="/post/new" method="post">
            <div class="mb-3">
                <label for="writer" class="form-label fw-bold">작성자</label>
                <input type="text" name="writer" id="writer" class="form-control" placeholder="이름을 입력하세요" required>
            </div>
            
            <div class="mb-3">
                <label for="title" class="form-label fw-bold">제목</label>
                <input type="text" name="title" id="title" class="form-control" placeholder="제목을 입력하세요" required>
            </div>
            
            <div class="mb-3">
                <label for="content" class="form-label fw-bold">내용</label>
                <textarea name="content" id="content" class="form-control" rows="10" placeholder="내용을 입력하세요" required></textarea>
            </div>
            
            <div class="d-flex justify-content-end gap-2">
                <a href="/post" class="btn btn-outline-secondary">취소</a>
                <button type="submit" class="btn btn-primary">저장하기</button>
            </div>
        </form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
