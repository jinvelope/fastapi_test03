<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>글 수정</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-warning">
                <h4 class="m-0">게시글 수정</h4>
            </div>
            <div class="card-body">
                <form action="/post/update" method="post">
                    <input type="hidden" name="num" value="{{ post.num }}">
                    <div class="mb-3">
                        <label class="form-label">작성자</label>
                        <input type="text" class="form-control" value="{{ post.writer }}" readonly>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">제목</label>
                        <input type="text" name="title" class="form-control" value="{{ post.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">내용</label>
                        <textarea name="content" class="form-control" rows="10" required>{{ post.content }}</textarea>
                    </div>
                    <div class="text-end">
                        <a href="/post/{{ post.num }}" class="btn btn-secondary">취소</a>
                        <button type="submit" class="btn btn-primary">수정완료</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
