<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>{{ post.title }} - 상세 보기</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="card shadow-sm">
            <div class="card-header bg-primary text-white">
                <h4 class="m-0">{{ post.title }}</h4>
            </div>
            <div class="card-body">
                <div class="d-flex justify-content-between text-muted mb-4 border-bottom pb-2">
                    <span>작성자: <strong>{{ post.writer }}</strong></span>
                    <span>작성일: {{ post.created_at.strftime('%Y-%m-%d %H:%M') if post.created_at else '' }}</span>
                </div>
                <div class="post-content" style="min-height: 200px;">
                    {{ post.content | replace('\n', '<br>') | safe }}
                </div>
            </div>
            <div class="card-footer text-end">
                <a href="/post" class="btn btn-secondary">목록으로</a>
                <a href="javascript:void(0);" onclick="deleteConfirm({{ post.num }})" class="btn btn-danger">삭제</a>
            </div>

            <script>
                function deleteConfirm(num) {
                    if(confirm("정말 삭제하시겠습니까?")) {
                        location.href = "/post/delete/" + num;
                    }
                }
            </script>
        </div>
    </div>
</body>
</html>
